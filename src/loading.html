<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #020810;
    color: #00d4ff;
    font-family: 'Courier New', monospace;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 32px;
    overflow: hidden;
    cursor: default;
  }
  .title {
    font-size: 36px;
    font-weight: bold;
    letter-spacing: 12px;
    text-shadow: 0 0 30px rgba(0,212,255,0.8);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 0.8; }
    50% { opacity: 1; text-shadow: 0 0 50px rgba(0,212,255,1); }
  }
  .subtitle {
    font-size: 11px;
    letter-spacing: 4px;
    color: rgba(0,212,255,0.5);
  }
  .ring-wrap {
    position: relative;
    width: 120px; height: 120px;
  }
  svg { position: absolute; inset: 0; width: 100%; height: 100%; }
  .ring-bg   { fill:none; stroke:rgba(0,212,255,0.1); stroke-width:3; }
  .ring-spin { fill:none; stroke:#00d4ff; stroke-width:3; stroke-linecap:round;
               stroke-dasharray:240; stroke-dashoffset:60;
               filter:drop-shadow(0 0 6px #00d4ff);
               transform-origin:center;
               animation: spin 2s linear infinite; }
  .ring-inner { fill:none; stroke:#ff6b2b; stroke-width:2; stroke-dasharray:120;
                stroke-dashoffset:30; stroke-linecap:round;
                transform-origin:center;
                animation: spin 1.4s linear infinite reverse; }
  .core {
    position:absolute; top:50%; left:50%;
    transform:translate(-50%,-50%);
    width:28px; height:28px; border-radius:50%;
    background: radial-gradient(circle, rgba(0,212,255,0.9), transparent 70%);
    box-shadow: 0 0 20px #00d4ff;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
  .log {
    font-size: 10px;
    letter-spacing: 2px;
    color: rgba(0,212,255,0.4);
    height: 80px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    text-align: center;
  }
  .log-line { animation: fadein 0.4s ease; }
  @keyframes fadein { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:none} }
  .bar-wrap {
    width: 260px; height: 2px;
    background: rgba(0,212,255,0.1);
    overflow: hidden;
  }
  .bar-fill {
    height: 100%; width: 0%;
    background: #00d4ff;
    box-shadow: 0 0 8px #00d4ff;
    animation: loading 4s ease-in-out forwards;
  }
  @keyframes loading { 0%{width:0%} 60%{width:80%} 100%{width:95%} }
</style>
</head>
<body>
  <div class="title">J.A.R.V.I.S.</div>
  <div class="ring-wrap">
    <svg viewBox="0 0 120 120">
      <circle class="ring-bg"    cx="60" cy="60" r="52"/>
      <circle class="ring-spin"  cx="60" cy="60" r="52"/>
      <circle class="ring-inner" cx="60" cy="60" r="34"/>
    </svg>
    <div class="core"></div>
  </div>
  <div class="bar-wrap"><div class="bar-fill"></div></div>
  <div class="log" id="log">
    <div class="log-line">INITIALISING NEURAL CORE...</div>
  </div>
  <div class="subtitle">JUST A RATHER VERY INTELLIGENT SYSTEM</div>

<script>
  const lines = [
    'LOADING SYSTEM MODULES...',
    'CONNECTING TO ANTHROPIC API...',
    'ACTIVATING VOICE ENGINE...',
    'LOADING MEMORY BANKS...',
    'ESTABLISHING SECURE UPLINK...',
    'ALL SYSTEMS NOMINAL.',
  ];
  const log = document.getElementById('log');
  let i = 0;
  const iv = setInterval(() => {
    if (i >= lines.length) { clearInterval(iv); return; }
    const el = document.createElement('div');
    el.className = 'log-line';
    el.textContent = lines[i++];
    log.appendChild(el);
    if (log.children.length > 4) log.removeChild(log.firstChild);
  }, 700);
</script>
</body>
</html>
